services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8015:8015"
    environment:
      - PLAYBOX_DATABASE_URL=postgresql://playbox:playbox@db:5432/playbox
      - PLAYBOX_DEBUG=true
      - PLAYBOX_CORS_ORIGINS=["http://localhost:5173"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - media_data:/app/media

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=playbox
      - POSTGRES_PASSWORD=playbox
      - POSTGRES_DB=playbox
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pg_data:
  media_data:
  node_modules:

